<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Forensics Terminal</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.jpg" type="image/x-icon">
</head>
<body>
  
  <div id="eventTimer" class="timer-ui">⏱ 60:00</div>
  <div class="screenfx"></div>

  <!-- ☰ Hamburger beside timer -->
<div class="menuTrigger" id="menuTrigger">☰</div>

<!-- Popup Menu Box -->
<div class="menuPopup" id="menuPopup">
    <div class="menuHeader">
        <span>Categories to be found:</span>
        <button id="closeMenu">✕</button>
    </div>

    <ul>
        <li><b>Weapon</b></li>
        <li><b>Location</b></li>
        <li><b>Motive</b></li>
        <li><b>Murderer</b></li>
    </ul>
</div>

<canvas id="matrix"></canvas>


<div class="terminal">
  <canvas id="radar"></canvas>

  <div id="livefeed"></div>
  <div id="output"></div>
  Welcome Investigator...

  Type "help" to see available commands.
  <div class="inputline">
    <span>&gt;</span>
    <input id="cmd" autocomplete="off" onkeydown="handleCommand(event)">
    <span class="caret"></span>
  </div>
</div>


</div>

<script src="script.js"></script>
</body>
</html>
